<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign In — SPACEBOYS Fan Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<link rel="icon" href="assets/images/Space%20boys/SPACEBOYS%20Landing%20page%20logo.jpeg" type="image/jpeg">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SPACEBOYS</a>
  <div class="nav-cta">
    <a href="index.html" class="btn btn-ghost btn-sm">← Home</a>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-panel reveal">
    <div class="section-tag">Fan Hub</div>
    <h1 class="auth-title">Join The<br>Family.</h1>
    <p class="auth-sub">Sign in to earn points, unlock tiers, and checkout merch securely with Stripe.</p>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="login">Sign In</button>
      <button type="button" class="auth-tab" data-tab="signup">Create Account</button>
    </div>

    <form id="loginForm" class="auth-form">
      <div class="auth-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In →</button>
    </form>

    <form id="signupForm" class="auth-form" hidden>
      <div class="auth-field">
        <label for="signupName">Full Name</label>
        <input type="text" id="signupName" required autocomplete="name" />
      </div>
      <div class="auth-field">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" required autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="signupPassword">Password (8+ characters)</label>
        <input type="password" id="signupPassword" required minlength="8" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account →</button>
      <p class="auth-note">+50 points when you join.</p>
    </form>

    <p class="auth-status" id="authStatus"></p>
  </div>
</main>

<script type="module" src="assets/js/fan-auth-page.js"></script>
</body>
</html>
